name: Test build and package QubesOS RPMs

on:
  push:
    branches:
      - 'aem*'
    tags:
      - '*'

jobs:
  qubes-dom0-package:
    uses: TrenchBoot/.github/.github/workflows/qubes-dom0-packagev2.yml@master
    with:
      qubes-component: 'vmm-xen'
      qubes-pkg-src-dir: '.'
      qubes-pkg-revision: '6'
      qubes-pkg-version: '4.17.5'
